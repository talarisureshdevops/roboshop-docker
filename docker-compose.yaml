services:
  catalogue:
    build: 
      context: .
      dockerfile: catalogue.dockerfile
    image: talarisureshdevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build: 
      context: .
      dockerfile: user.dockerfile
    image: talarisureshdevops/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb
  frontend:
    build: 
      context: .
      dockerfile: frontend.dockerfile
    image: talarisureshdevops/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
  mongodb:
    build:
      context: .
      dockerfile: mongodb.dockerfile
    image: talarisureshdevops/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis


networks:
  default:
    driver: bridge
    name: roboshop