services:
  catalogue:
    build: 
      context: .
      dockerfile: catalogue.dockerfile
    image: talarisureshdevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
    mongodb:
      build:
        context: .
        dockerfile: mongodb.dockerfile
      image: talarisureshdevops/mongodb:1.0.0
      container_name: mongodb

networks:
  default:
    driver: bridge
    name: roboshop
      

