services:
  catalogue:
    build: 
      context: .
      dockerfile: catalogue.dockerfile
    image: talarisureshdevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build:
      dockerfile: user.dockerfile
    image: talarisureshdevops/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb
  frontend:
    build: 
      dockerfile: frontend.dockerfile
    image: talarisureshdevops/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment
  cart:
    build:
      dockerfile: cart.dockerfile
    image: talarisureshdevops/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue
  shipping:
    build: 
      dockerfile: shipping.dockerfile
    image: talarisureshdevops/shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
      - cart
  payment: 
    build: 
      dockerfile: payment.dockerfile
    image: talarisureshdevops/payment:1.0.0
    container_name: payment
    entrypoint: 
      CART_HOST:cart
      CART_PORT:8080
      USER_HOST:user
      USER_PORT:8080
      AMQP_HOST:rabbitmq
      AMQP_USER:roboshop
      AMQP_PASS:roboshop123
    depends_on:
      - cart
      - user
      - rabbitmq
  
  redis:
    image: redis:7.0
    container_name: redis

  mysql:
    build: 
      dockerfile: mysql.dockerfile
    image: talarisureshdevops/mysql:1.0.0
    container_name: mysql

  rabbitmq:
    image: rabbitmq:3
    entrypoint: 
      RABBITMQ_DEFAULT_USER= roboshop
      RABBITMQ_DEFAULT_PASS= roboshop123
    container_name: rabbitmq

  mongodb:
    build:
      dockerfile: mongodb.dockerfile
    image: talarisureshdevops/mongodb:1.0.0
    container_name: mongodb

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually
